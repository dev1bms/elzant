{% load static i18n %}
<section class="bg-ivory-50 px-6 py-24">
  <div class="mx-auto max-w-md text-center">
    <div class="reveal sec-head">
      <p class="kicker">Share</p>
      <h2 class="text-3xl font-light text-charcoal sm:text-4xl">شارك الدعوة</h2>
      <p class="text-charcoal-soft">ادعُ من تحب لمشاركتنا الفرحة</p>
    </div>

      <div class="rounded-2xl border border-sand-300 bg-white p-5">

      </div>
      <p class="num mt-4 text-sm italic tracking-wide text-gold-500">elzant.com</p>

      <a href="https://wa.me/?text={% filter urlencode %}شاركونا فرحة زفاف {{ config.groom_name }} و{{ config.bride_name }} {{ site_url }}{% endfilter %}"
