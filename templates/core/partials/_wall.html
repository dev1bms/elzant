{% load i18n %}
<section id="wall" class="wall-canvas px-6 py-28">
  <div class="relative mx-auto max-w-3xl">
    <div class="reveal sec-head text-center">
      <p class="label-lat">A Gallery of Words</p>
      <h2 class="text-4xl text-ink sm:text-5xl">جدار التهاني</h2>
      <span class="wall-flourish" aria-hidden="true"></span>
    </div>

    {% if greetings %}
      <div class="mt-14 columns-1 gap-6 sm:columns-2 [&>*]:mb-6">
        {% for g in greetings %}
          <figure class="msg-card reveal break-inside-avoid{% if g.photo_thumbnail %} msg-card--photo{% endif %}">
            {% if g.photo_thumbnail %}
              <div class="msg-frame mb-5">
                <img src="{{ g.photo_thumbnail.url }}" alt="صورة مرفقة بالتهنئة" loading="lazy" class="h-48 w-full object-cover" width="480" height="360">
              </div>
            {% endif %}
            <span class="msg-quote" aria-hidden="true">&ldquo;</span>
            <blockquote class="msg-text mt-1">{{ g.message|linebreaksbr }}</blockquote>
            <figcaption class="msg-sign mt-5">
              <span class="dash"></span>
              <span class="nm">{{ g.name }}</span>
              {% if g.country_flag %}<span class="flag" title="{{ g.country_name }}">{{ g.country_flag }}</span>{% endif %}
            </figcaption>
          </figure>
        {% endfor %}
      </div>
    {% else %}
      <p class="reveal mt-14 text-center text-cloud">كن أوّل من يهنّئ العروسين</p>
    {% endif %}
  </div>
</section>
