{% load i18n %}
<section class="bg-ivory-100 px-6 py-24">
  <div class="mx-auto max-w-3xl">
    <div class="reveal sec-head text-center">
      <p class="kicker">Messages</p>
      <h2 class="text-3xl font-light text-charcoal sm:text-4xl">جدار التهاني</h2>
    </div>

    {% if greetings %}
      <div class="mt-12 columns-1 gap-5 sm:columns-2 [&>*]:mb-5">
        {% for g in greetings %}
          <figure class="reveal surface break-inside-avoid p-7">
            <blockquote class="leading-loose text-charcoal">{{ g.message|linebreaksbr }}</blockquote>
            <figcaption class="mt-5 flex items-center gap-2.5 text-sm text-burgundy-500">
              <span class="h-px w-4 bg-rose-400"></span>{{ g.name }}
            </figcaption>
          </figure>
        {% endfor %}
      </div>
    {% else %}
      <p class="reveal mt-12 text-center text-charcoal-soft">كن أوّل من يهنّئ العروسين</p>
    {% endif %}
  </div>
</section>
