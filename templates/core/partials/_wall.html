{% load i18n %}
<section class="py-16">
  <div class="mx-auto max-w-3xl px-6">
    <p class="reveal eyebrow mb-3 block text-center text-gold-600">كلماتٌ من الأحبّة</p>
    <h2 class="reveal mb-10 text-center font-display text-3xl text-burgundy-700 sm:text-4xl">{% trans "جدار التهاني" %}</h2>

    {% if greetings %}
      <div class="grid gap-5 sm:grid-cols-2">
        {% for g in greetings %}
          <figure class="reveal panel group relative overflow-hidden px-7 pb-6 pt-7 transition duration-300 hover:-translate-y-1 hover:shadow-[0_28px_55px_-24px_rgba(74,18,38,0.42)]">
            <span class="pointer-events-none absolute -top-4 right-5 select-none font-display text-7xl leading-none text-gilt opacity-50" aria-hidden="true">”</span>
            <blockquote class="relative leading-loose text-burgundy-800">{{ g.message|linebreaksbr }}</blockquote>
            <figcaption class="mt-5 flex items-center gap-2.5 text-sm font-semibold text-gold-600">
              <span class="h-px w-6 bg-gradient-to-l from-gold-400 to-transparent"></span>{{ g.name }}
            </figcaption>
          </figure>
        {% endfor %}
      </div>
    {% else %}
      <div class="reveal panel mx-auto max-w-md px-8 py-12 text-center">
        <div class="flourish flourish--sm mb-4 text-gold-500" aria-hidden="true"><span></span>
          <svg viewBox="0 0 24 24" class="fill-current"><path d="M12 1l1.74 6.8 6.04-3.58-3.58 6.04L23 12l-6.8 1.74 3.58 6.04-6.04-3.58L12 23l-1.74-6.8-6.04 3.58 3.58-6.04L1 12l6.8-1.74L4.22 4.22l6.04 3.58z"/></svg>
          <span></span>
        </div>
        <p class="text-burgundy-500">كن أوّل من يهنّئ العروسين</p>
      </div>
    {% endif %}
  </div>
</section>
