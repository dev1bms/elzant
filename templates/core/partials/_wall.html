{% load i18n %}
<section class="bg-cream-50 py-14">
  <div class="mx-auto max-w-3xl px-6">
    <h2 class="reveal mb-8 text-center font-display text-3xl text-burgundy-700">{% trans "جدار التهاني" %}</h2>

    {% if greetings %}
      <div class="grid gap-5 sm:grid-cols-2">
        {% for g in greetings %}
          <figure class="reveal rounded-2xl bg-white p-6 shadow-sm ring-1 ring-cream-200">
            <blockquote class="leading-relaxed text-burgundy-800">{{ g.message|linebreaksbr }}</blockquote>
            <figcaption class="mt-4 text-sm font-semibold text-gold-600">— {{ g.name }}</figcaption>
          </figure>
        {% endfor %}
      </div>
    {% else %}
      <p class="reveal text-center text-burgundy-400">كن أوّل من يهنّئ العروسين 🤍</p>
    {% endif %}
  </div>
</section>
