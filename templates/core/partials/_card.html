{% load i18n %}
<div class="card-stage" id="card-stage">
  <div class="wed-card" id="card">
    <div class="wed-card__keyline"></div>

    <div>
      <p class="wed-card__label">تهنئة</p>
      <h2 class="wed-card__names">{{ config.groom_name }} <span>&amp;</span> {{ config.bride_name }}</h2>
    </div>

    <div class="wed-card__body">
      <div class="wed-card__rule"></div>
      <p class="wed-card__message">{{ card.message }}</p>
      <p class="wed-card__from">— {{ card.name }}</p>
    </div>

    <div class="wed-card__foot">
      <span class="wed-card__date">{% language 'ar' %}{{ config.wedding_datetime|date:'d . m . Y' }}{% endlanguage %}</span>
      <span class="wed-card__site">elzant.com</span>
    </div>
  </div>
</div>
