{% load i18n %}
<section id="moments" class="relative overflow-hidden bg-gradient-to-b from-burgundy-700 to-burgundy-800 py-16 text-cream-50">
  <div class="pointer-events-none absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-gold-400/60 to-transparent"></div>
  <div class="pointer-events-none absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-gold-400/40 to-transparent"></div>
  <div class="pointer-events-none absolute left-1/2 top-0 h-48 w-[80%] -translate-x-1/2 rounded-full bg-gold-400/10 blur-3xl"></div>

  <div class="relative mx-auto max-w-2xl px-6 text-center">
    <p class="reveal eyebrow mb-3 text-gold-400">العدّ التنازلي</p>
    <h2 class="reveal mb-2 font-display text-3xl text-gold-200 sm:text-4xl">{% trans "باقٍ على الفرح" %}</h2>
    <div class="reveal flourish flourish--sm mx-auto mb-9 text-gold-400/80" aria-hidden="true">
      <span></span>
      <svg viewBox="0 0 24 24" class="fill-current"><path d="M12 1l1.74 6.8 6.04-3.58-3.58 6.04L23 12l-6.8 1.74 3.58 6.04-6.04-3.58L12 23l-1.74-6.8-6.04 3.58 3.58-6.04L1 12l6.8-1.74L4.22 4.22l6.04 3.58z"/></svg>
      <span></span>
    </div>

    {# one connected clock — four units split by gold hairlines (RTL-aware) #}
    <div id="countdown" data-target="{{ config.wedding_datetime|date:'c' }}"
         class="reveal mx-auto grid max-w-md grid-cols-4 overflow-hidden rounded-2xl border border-gold-400/30 bg-burgundy-800/40 shadow-[inset_0_1px_0_rgba(236,218,166,0.12),0_20px_40px_-24px_rgba(0,0,0,0.6)] backdrop-blur-sm">
      <div class="flex flex-col items-center px-2 py-5 sm:py-6">
        <span data-unit="days" class="font-display text-4xl leading-none text-gold-200 sm:text-5xl">٠</span>
        <span class="mt-2 text-[0.7rem] tracking-[0.25em] text-gold-300/80">يوم</span>
      </div>
      <div class="flex flex-col items-center border-s border-gold-400/20 px-2 py-5 sm:py-6">
        <span data-unit="hours" class="font-display text-4xl leading-none text-gold-200 sm:text-5xl">٠٠</span>
        <span class="mt-2 text-[0.7rem] tracking-[0.25em] text-gold-300/80">ساعة</span>
      </div>
      <div class="flex flex-col items-center border-s border-gold-400/20 px-2 py-5 sm:py-6">
        <span data-unit="minutes" class="font-display text-4xl leading-none text-gold-200 sm:text-5xl">٠٠</span>
        <span class="mt-2 text-[0.7rem] tracking-[0.25em] text-gold-300/80">دقيقة</span>
      </div>
      <div class="flex flex-col items-center border-s border-gold-400/20 px-2 py-5 sm:py-6">
        <span data-unit="seconds" class="font-display text-4xl leading-none text-gold-200 sm:text-5xl">٠٠</span>
        <span class="mt-2 text-[0.7rem] tracking-[0.25em] text-gold-300/80">ثانية</span>
      </div>
    </div>

    <p data-countdown-done class="reveal mt-7 hidden font-display text-2xl text-gold-300">تمّ الزفاف بحمد الله 🤍</p>
  </div>
</section>
