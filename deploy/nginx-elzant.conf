# Nginx site for elzant.com — install at /etc/nginx/sites-available/elzant
# then: ln -s /etc/nginx/sites-available/elzant /etc/nginx/sites-enabled/
#
# This is the HTTP (port 80) config. Run certbot --nginx afterwards; it injects
# the HTTPS (443) server block and an HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name elzant.com www.elzant.com;

    client_max_body_size 2m;

    # Let Nginx answer the ACME challenge directly (not proxied to Django).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve collected static files directly (faster than the app).
    location /static/ {
        alias /srv/elzant/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # Django trusts this for HTTPS
        proxy_redirect off;
    }
}
