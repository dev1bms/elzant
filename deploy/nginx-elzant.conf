# OPTIONAL / EXAMPLE — Nginx is NOT required for this project. The app serves
# static files via WhiteNoise, and the recommended deployment is Gunicorn behind
# Cloudflare Tunnel or Caddy (see deploy/DEPLOY.md). Use this file only if you
# already run Nginx and prefer it to serve /static/ directly.
#
# Install at /etc/nginx/sites-available/elzant then symlink into sites-enabled/.
# HTTP (port 80) config; run `certbot --nginx` to add the HTTPS block + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name elzant.com www.elzant.com;

    client_max_body_size 2m;

    # Let Nginx answer the ACME challenge directly (not proxied to Django).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve collected static files directly (faster than the app).
    location /static/ {
        alias /srv/elzant/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # Django trusts this for HTTPS
        proxy_redirect off;
    }
}
