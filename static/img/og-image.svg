<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdfaf2"/>
      <stop offset="55%" stop-color="#f7edd9"/>
      <stop offset="100%" stop-color="#f1e3c6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#fffdf8"/>
      <stop offset="100%" stop-color="#fffdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gilt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0dba6"/>
      <stop offset="50%" stop-color="#c8a24e"/>
      <stop offset="100%" stop-color="#a8843a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- double gold frame -->
  <rect x="30" y="30" width="1140" height="570" rx="20" fill="none" stroke="#c8a24e" stroke-width="3"/>
  <rect x="44" y="44" width="1112" height="542" rx="14" fill="none" stroke="#dcc07f" stroke-width="1" opacity="0.7"/>

  <!-- corner flourishes -->
  <g stroke="#a8843a" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M70 120C70 88 88 70 120 70"/>
    <path d="M1130 120C1130 88 1112 70 1080 70"/>
    <path d="M70 510C70 542 88 560 120 560"/>
    <path d="M1130 510C1130 542 1112 560 1080 560"/>
  </g>

  <text x="600" y="138" text-anchor="middle" font-family="'Geeza Pro','Cairo',sans-serif" font-size="30" fill="#a8843a" letter-spacing="7">بسم الله الرحمن الرحيم</text>

  <text x="600" y="288" text-anchor="middle" direction="rtl" font-family="'Geeza Pro','Cairo',serif" font-size="112" font-weight="700" fill="#6a1c30">محمود <tspan fill="#c8a24e">&amp;</tspan> رينان</text>

  <!-- eight-point star divider between tapered hairlines -->
  <g transform="translate(0,0)">
    <line x1="430" y1="356" x2="556" y2="356" stroke="#dcc07f" stroke-width="2"/>
    <line x1="644" y1="356" x2="770" y2="356" stroke="#dcc07f" stroke-width="2"/>
    <g transform="translate(600 356) scale(1.35)" fill="url(#gilt)"><path d="M0 -11 L2.93 -4.20 L7.78 -7.78 L4.20 -2.93 L11 0 L4.20 2.93 L7.78 7.78 L2.93 4.20 L0 11 L-2.93 4.20 L-7.78 7.78 L-4.20 2.93 L-11 0 L-4.20 -2.93 L-7.78 -7.78 L-2.93 -4.20 Z"/></g>
  </g>

  <text x="600" y="448" text-anchor="middle" font-family="'Geeza Pro','Cairo',sans-serif" font-size="44" fill="#531526">شاركونا فرحة العمر</text>
  <text x="600" y="516" text-anchor="middle" font-family="'Geeza Pro','Cairo',sans-serif" font-size="40" font-weight="600" fill="#6a1c30">٢٢ يوليو ٢٠٢٦</text>
  <text x="600" y="572" text-anchor="middle" font-family="Georgia, serif" font-size="25" fill="#a8843a" letter-spacing="4">elzant.com</text>
</svg>
